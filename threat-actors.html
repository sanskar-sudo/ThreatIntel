<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threat Actor Intelligence Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #07090d;
  --bg2:      #0d1117;
  --bg3:      #131920;
  --bg4:      #192030;
  --bd:       #1c2535;
  --bd2:      #253040;
  --tx:       #cdd6e8;
  --tx2:      #637590;
  --tx3:      #2e3f55;
  --red:      #f0544f;
  --red-d:    rgba(240,84,79,.12);
  --amber:    #e8a030;
  --amber-d:  rgba(232,160,48,.11);
  --blue:     #3b9eff;
  --blue-d:   rgba(59,158,255,.11);
  --green:    #34c07a;
  --green-d:  rgba(52,192,122,.11);
  --purple:   #a673f5;
  --purple-d: rgba(166,115,245,.11);
  --teal:     #24c8c0;
  --teal-d:   rgba(36,200,192,.11);
  --pink:     #f06090;
  --r-sm:4px; --r-md:8px; --r-lg:12px;
  --mono:'JetBrains Mono',monospace;
  --sans:'Outfit',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:14px;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(59,158,255,.05) 0%,transparent 60%),linear-gradient(rgba(255,255,255,.011) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.011) 1px,transparent 1px);background-size:100% 100%,40px 40px,40px 40px}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit}
input,select{font-family:inherit}

/* TOPBAR */
#topbar{position:sticky;top:0;z-index:200;height:54px;background:rgba(7,9,13,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:20px}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.brand-logo{width:28px;height:28px;border:1.5px solid var(--red);border-radius:var(--r-sm);display:grid;place-items:center;background:var(--red-d)}
.brand-logo svg{width:14px;height:14px;fill:none;stroke:var(--red);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.brand-name{font-family:var(--sans);font-size:14px;font-weight:700;color:var(--tx)}
.brand-name span{color:var(--red)}
.topbar-nav{display:flex;align-items:center;gap:2px;flex:1}
.tnav-btn{padding:5px 13px;border:none;border-radius:var(--r-sm);background:none;color:var(--tx2);font-family:var(--sans);font-size:13px;font-weight:500;transition:all .15s}
.tnav-btn:hover{color:var(--tx);background:var(--bg3)}
.tnav-btn.active{color:var(--blue);background:var(--blue-d)}
.topbar-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.ver-badge{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--green);padding:3px 9px;background:var(--green-d);border:1px solid rgba(52,192,122,.2);border-radius:20px;display:flex;align-items:center;gap:5px}
.ver-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* LAYOUT */
#app{position:relative;z-index:1}
.view{display:none;padding:22px 24px;max-width:1700px;margin:0 auto}
.view.active{display:block;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* STATS STRIP */
.stats-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:22px}
.stat-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r-lg);padding:14px 16px;border-top:2px solid}
.stat-label{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.stat-value{font-family:var(--mono);font-size:26px;font-weight:600;line-height:1;color:var(--tx)}
.stat-sub{font-size:11px;color:var(--tx3);margin-top:3px}

/* FILTERS */
.filters-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.search-field{flex:1;min-width:200px;display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r-md);padding:0 12px;transition:border-color .15s}
.search-field:focus-within{border-color:var(--blue)}
.search-field svg{width:13px;height:13px;flex-shrink:0;fill:none;stroke:var(--tx2);stroke-width:2;stroke-linecap:round}
.search-field input{background:none;border:none;outline:none;color:var(--tx);font-family:var(--mono);font-size:12px;width:100%;padding:9px 0}
.search-field input::placeholder{color:var(--tx3)}
.fsel{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r-md);padding:8px 10px;color:var(--tx2);font-family:var(--sans);font-size:12.5px;font-weight:500;outline:none;cursor:pointer;transition:border-color .15s}
.fsel:focus{border-color:var(--blue);color:var(--tx)}
.count-chip{font-family:var(--mono);font-size:11px;color:var(--tx2);padding:8px 12px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r-md);white-space:nowrap;margin-left:auto}

/* ACTOR GRID */
.actor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:10px}
.actor-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r-lg);padding:16px 18px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.actor-card:hover{border-color:rgba(59,158,255,.45);transform:translateY(-1px);box-shadow:0 8px 28px rgba(0,0,0,.4)}
.actor-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px;gap:10px}
.actor-id{font-family:var(--mono);font-size:10px;color:var(--tx3);margin-bottom:2px}
.actor-name{font-size:15px;font-weight:600;color:var(--tx);line-height:1.2}
.actor-aliases{font-size:11px;color:var(--tx2);margin-top:2px;font-style:italic}
.origin-badge{font-family:var(--mono);font-size:10px;font-weight:600;padding:3px 9px;border-radius:10px;border:1px solid;white-space:nowrap;flex-shrink:0}
.actor-desc{font-size:12px;color:var(--tx2);line-height:1.6;margin-bottom:11px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.actor-footer{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.pill{font-family:var(--mono);font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;border:1px solid;white-space:nowrap}
.actor-card .arrow{margin-left:auto;color:var(--tx3);font-size:12px}

/* DETAIL PANEL */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:299;display:none;backdrop-filter:blur(3px)}
.panel-overlay.open{display:block}
#detail-panel{position:fixed;top:0;right:0;bottom:0;width:560px;max-width:100vw;background:var(--bg2);border-left:1px solid var(--bd2);z-index:300;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:-16px 0 48px rgba(0,0,0,.5)}
#detail-panel.open{transform:translateX(0)}
.panel-header{padding:22px 22px 16px;border-bottom:1px solid var(--bd);flex-shrink:0;position:relative}
.panel-close{position:absolute;top:16px;right:16px;background:none;border:1px solid var(--bd);color:var(--tx2);border-radius:var(--r-sm);padding:4px 10px;font-family:var(--mono);font-size:11px;transition:all .15s}
.panel-close:hover{border-color:var(--red);color:var(--red)}
.panel-actor-id{font-family:var(--mono);font-size:10px;color:var(--tx3);margin-bottom:3px}
.panel-name{font-size:21px;font-weight:700;color:var(--tx);margin-bottom:5px;line-height:1.2;padding-right:60px}
.panel-aliases{font-size:12px;color:var(--tx2);margin-bottom:11px}
.panel-tags{display:flex;gap:5px;flex-wrap:wrap}
.panel-tabs{display:flex;border-bottom:1px solid var(--bd);padding:0 22px;flex-shrink:0}
.ptab{padding:10px 14px;border:none;background:none;color:var(--tx2);font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px}
.ptab:hover{color:var(--tx)}
.ptab.active{color:var(--blue);border-bottom-color:var(--blue)}
.panel-body{flex:1;overflow-y:auto;padding:18px 22px}
.panel-body::-webkit-scrollbar{width:4px}
.panel-body::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.p-section{margin-bottom:22px}
.p-section-label{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.p-desc{font-size:13px;color:var(--tx2);line-height:1.7}
.p-link{font-family:var(--mono);font-size:11px;color:var(--blue);padding:5px 0;border-bottom:1px solid var(--bd);display:block;transition:opacity .15s}
.p-link:hover{opacity:.7}
.tech-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(28,37,53,.7)}
.tech-item:last-child{border-bottom:none}
.tech-item-id{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--amber);background:var(--amber-d);border:1px solid rgba(232,160,48,.2);border-radius:var(--r-sm);padding:2px 7px;white-space:nowrap;flex-shrink:0;cursor:pointer}
.tech-item-id:hover{background:rgba(232,160,48,.2)}
.tech-item-name{font-size:12px;font-weight:500;color:var(--tx)}
.tech-item-tactic{font-size:11px;color:var(--tx3);margin-top:1px}
.sw-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(28,37,53,.7)}
.sw-item:last-child{border-bottom:none}
.sw-type-badge{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;border:1px solid;white-space:nowrap;flex-shrink:0}
.sw-name{font-size:12px;font-weight:500;color:var(--tx)}
.sw-desc{font-size:11px;color:var(--tx3);margin-top:1px}
.tactic-bar-row{margin-bottom:7px}
.tactic-bar-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--tx2);margin-bottom:3px}
.tactic-bar-labels span{font-family:var(--mono);font-size:10px;color:var(--tx3)}
.tactic-track{height:4px;background:var(--bg4);border-radius:3px;overflow:hidden}
.tactic-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* TECHNIQUES VIEW */
.tactic-section{margin-bottom:26px}
.tactic-header{display:flex;align-items:center;gap:10px;margin-bottom:11px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
.tactic-name{font-size:13px;font-weight:600;color:var(--tx)}
.tactic-count-badge{font-family:var(--mono);font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;border:1px solid}
.tech-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:7px}
.tech-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r-md);padding:11px 13px;cursor:pointer;transition:border-color .15s}
.tech-card:hover{border-color:rgba(232,160,48,.5)}
.tech-card-id{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--amber);margin-bottom:3px}
.tech-card-name{font-size:12px;font-weight:500;color:var(--tx);margin-bottom:5px}
.tech-card-actors{display:flex;gap:4px;flex-wrap:wrap}
.tech-actor-tag{font-family:var(--mono);font-size:9.5px;padding:1px 6px;background:var(--blue-d);border:1px solid rgba(59,158,255,.2);border-radius:10px;color:var(--blue)}

/* HEATMAP VIEW */
.heatmap-wrap{overflow-x:auto;margin-top:4px}
.heatmap-table{border-collapse:collapse;min-width:900px;width:100%}
.hm-tactic-th{font-family:var(--mono);font-size:9px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;padding:5px 3px;text-align:center;writing-mode:vertical-rl;transform:rotate(180deg);height:78px;white-space:nowrap;vertical-align:bottom}
.hm-actor-label{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--tx2);padding:3px 10px 3px 0;white-space:nowrap;cursor:pointer;transition:color .15s}
.hm-actor-label:hover{color:var(--blue)}
.hm-cell{width:20px;height:20px;border-radius:3px;cursor:pointer;transition:transform .1s}
.hm-cell:hover{transform:scale(1.4)}
.hm-td{padding:1px 2px;text-align:center}

/* SOFTWARE VIEW */
.sw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:9px}
.sw-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r-lg);padding:14px 16px;cursor:pointer;transition:border-color .15s}
.sw-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:7px}
.sw-card-id{font-family:var(--mono);font-size:10px;color:var(--tx3);margin-bottom:2px}
.sw-card-name{font-size:14px;font-weight:600;color:var(--tx)}
.sw-card-aliases{font-size:11px;color:var(--tx2);margin-top:2px;font-style:italic}
.sw-card-desc{font-size:12px;color:var(--tx2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--tx3);font-family:var(--mono);font-size:12px}

/* SECTION ROW */
.section-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.section-title{font-size:14px;font-weight:600;color:var(--tx)}

/* MOBILE */
#mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(7,9,13,.97);border-top:1px solid var(--bd);backdrop-filter:blur(14px);z-index:200;align-items:stretch}
.mnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--tx2);font-family:var(--sans);font-size:9px;font-weight:500;-webkit-tap-highlight-color:transparent;transition:color .15s}
.mnav-btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.mnav-btn.active{color:var(--blue)}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

@media(max-width:768px){
  #topbar{padding:0 14px}
  .topbar-nav{display:none}
  #mobile-nav{display:flex}
  .view{padding:14px 14px 68px}
  .actor-grid{grid-template-columns:1fr}
  #detail-panel{width:100vw}
  .tech-grid{grid-template-columns:1fr}
  .sw-grid{grid-template-columns:1fr}
  .stats-strip{grid-template-columns:1fr 1fr}
}
@media(max-width:380px){.stats-strip{grid-template-columns:1fr}}
</style>
</head>

    if (!techActors[tid].includes(g.name)) techActors[tid].push(g.name);
  });
});

/* ============================================================
   HELPERS
   ============================================================ */
const $id = id => document.getElementById(id);
function originStyle(o) { return ORIGIN_STYLE[o] || ORIGIN_STYLE['Unknown']; }
function tacColor(t)    { return TACTIC_COLORS[t] || '#637590'; }
function tacLabel(t)    { return TACTIC_LABELS[t] || t; }
function trunc(s, n)    { return s && s.length > n ? s.slice(0, n) + '…' : (s || ''); }
function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

/* ============================================================
   DETAIL PANEL
   ============================================================ */
const Panel = {
  currentId: null,
  currentTab: 'overview',
  tacticFilter: null,

  open(id, tab='overview', tacticFilter=null) {
    this.currentId = id; this.currentTab = tab; this.tacticFilter = tacticFilter;
    this._render();
    $id('detail-panel').classList.add('open');
    $id('panel-overlay').classList.add('open');
  },
  close() {
    $id('detail-panel').classList.remove('open');
    $id('panel-overlay').classList.remove('open');
  },
  _render() {
    const g = groupById[this.currentId]; if (!g) return;
    const style = originStyle(g.origin);
    const aliases = (g.aliases||[]).filter(a=>a!==g.name).join(', ');

    $id('panel-header').innerHTML = `
      <button class="panel-close" onclick="Panel.close()">ESC</button>
      <div class="panel-actor-id">${g.id}</div>
      <div class="panel-name">${g.name}</div>
      ${aliases?`<div class="panel-aliases">Also known as: ${trunc(aliases,80)}</div>`:''}
      <div class="panel-tags">
        <span class="pill" style="color:${style.color};border-color:${style.color}44;background:${style.bg}">${g.origin}</span>
        ${g.techs?.length?`<span class="pill" style="color:var(--amber);border-color:var(--amber)44;background:var(--amber-d)">${g.techs.length} techniques</span>`:''}
        ${g.sw?.length?`<span class="pill" style="color:var(--purple);border-color:var(--purple)44;background:var(--purple-d)">${g.sw.length} tools</span>`:''}
        ${g.campaigns?.length?`<span class="pill" style="color:var(--teal);border-color:var(--teal)44;background:var(--teal-d)">${g.campaigns.length} campaigns</span>`:''}
      </div>`;

    const tabsEl = $id('panel-tabs');
    tabsEl.innerHTML = '';
    [['overview','Overview'],['techniques','Techniques'],['software','Software'],['campaigns','Campaigns']].forEach(([id,label])=>{
      const btn = document.createElement('button'); btn.className = 'ptab'+(id===this.currentTab?' active':'');
      btn.textContent = label;
      btn.addEventListener('click', ()=>{
        this.currentTab=id; this.tacticFilter=null;
        document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
        btn.classList.add('active');
        this._renderBody(g);
      });
      tabsEl.appendChild(btn);
    });
    this._renderBody(g);
  },
  _renderBody(g) {
    const body = $id('panel-body'); body.innerHTML = '';
    if (this.currentTab==='overview')    this._overview(body,g);
    if (this.currentTab==='techniques')  this._techniques(body,g);
    if (this.currentTab==='software')    this._software(body,g);
    if (this.currentTab==='campaigns')   this._campaigns(body,g);
  },
  _overview(body,g) {
    /* description */
    const s1 = document.createElement('div'); s1.className='p-section';
    s1.innerHTML = `<div class="p-section-label">Description</div><div class="p-desc">${g.desc||'No description available.'}</div>`;
    body.appendChild(s1);

    /* tactic breakdown */
    if (g.techs?.length) {
      const s2 = document.createElement('div'); s2.className='p-section';
      s2.innerHTML = '<div class="p-section-label">Tactic Breakdown</div>';
      const tacCounts = {};
      TACTIC_ORDER.forEach(t=>tacCounts[t]=0);
      (g.techs||[]).forEach(tid=>{ const t=techById[tid]; if(t&&tacCounts[t.tactic]!==undefined)tacCounts[t.tactic]++; });
      const max = Math.max(...Object.values(tacCounts),1);
      TACTIC_ORDER.forEach(tac=>{
        const cnt = tacCounts[tac]; if(!cnt) return;
        const color = tacColor(tac);
        const row = document.createElement('div'); row.className='tactic-bar-row';
        row.innerHTML = `<div class="tactic-bar-labels"><span style="color:${color}">${tacLabel(tac)}</span><span>${cnt}</span></div>
          <div class="tactic-track"><div class="tactic-fill" style="width:${(cnt/max)*100}%;background:${color}"></div></div>`;
        s2.appendChild(row);
      });
      body.appendChild(s2);
    }

    /* campaigns */
    const camps = DATA.campaigns.filter(c=>c.group===g.name);
    if (camps.length) {
      const s3 = document.createElement('div'); s3.className='p-section';
      s3.innerHTML = `<div class="p-section-label">Notable Campaigns</div>`;
      camps.forEach(c => {
        const item = document.createElement('div');
        item.style.cssText = 'background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r-md);padding:10px 12px;margin-bottom:7px';
        item.innerHTML = `<div style="font-size:13px;font-weight:600;color:var(--tx);margin-bottom:3px">${c.name} <span style="font-family:var(--mono);font-size:10px;color:var(--tx3)">${c.year}</span></div>
          <div style="font-size:12px;color:var(--tx2);line-height:1.6">${c.desc}</div>`;
        s3.appendChild(item);
      });
      body.appendChild(s3);
    }

    /* link */
    const s4 = document.createElement('div'); s4.className='p-section';
    s4.innerHTML = `<div class="p-section-label">MITRE ATT&CK Reference</div>
      <a class="p-link" href="https://attack.mitre.org/groups/${g.id}/" target="_blank">View ${g.name} on attack.mitre.org &#8599;</a>`;
    body.appendChild(s4);
  },
  _techniques(body,g) {
    const techs = (g.techs||[]).map(tid=>techById[tid]).filter(Boolean);
    if (!techs.length) { body.innerHTML='<div class="empty">No techniques attributed.</div>'; return; }
    const s = document.createElement('div'); s.className='p-section';
    s.innerHTML = `<div class="p-section-label">${techs.length} Techniques</div>`;

    const byTactic = {};
    techs.forEach(t=>{ if(!byTactic[t.tactic])byTactic[t.tactic]=[]; byTactic[t.tactic].push(t); });
    const tacFilter = this.tacticFilter;
    const tacs = tacFilter ? [tacFilter] : TACTIC_ORDER.filter(t=>byTactic[t]?.length);

    tacs.forEach(tac=>{
      const list=byTactic[tac]; if(!list?.length) return;
      const color=tacColor(tac);
      const header=document.createElement('div');
      header.style.cssText=`font-size:11px;font-weight:600;color:${color};margin:14px 0 6px;text-transform:uppercase;letter-spacing:.07em`;
      header.textContent=`${tacLabel(tac)} (${list.length})`;
      s.appendChild(header);
      list.sort((a,b)=>a.name.localeCompare(b.name)).forEach(t=>{
        const item=document.createElement('div'); item.className='tech-item';
        item.style.cursor='pointer';
        item.addEventListener('click',()=>window.open(`https://attack.mitre.org/techniques/${t.id}/`,'_blank'));
        const tid=document.createElement('span'); tid.className='tech-item-id'; tid.textContent=t.id;
        const info=document.createElement('div');
        info.innerHTML=`<div class="tech-item-name">${t.name}</div><div class="tech-item-tactic">${tacLabel(t.tactic)}</div>`;
        item.append(tid,info); s.appendChild(item);
      });
    });
    body.appendChild(s);
    this.tacticFilter=null;
  },
  _software(body,g) {
    const sws = (g.sw||[]).map(sid=>swById[sid]).filter(Boolean);
    if (!sws.length) { body.innerHTML='<div class="empty">No software attributed.</div>'; return; }
    const s=document.createElement('div'); s.className='p-section';
    s.innerHTML=`<div class="p-section-label">${sws.length} Software</div>`;
    sws.sort((a,b)=>a.name.localeCompare(b.name)).forEach(sw=>{
      const isMal=sw.type==='malware';
      const color=isMal?'var(--red)':'var(--teal)';
      const item=document.createElement('div'); item.className='sw-item';
      const badge=document.createElement('span'); badge.className='sw-type-badge';
      badge.textContent=isMal?'Malware':'Tool';
      badge.style.color=color; badge.style.borderColor=isMal?'rgba(240,84,79,.25)':'rgba(36,200,192,.25)'; badge.style.background=isMal?'var(--red-d)':'var(--teal-d)';
      const info=document.createElement('div');
      info.innerHTML=`<div class="sw-name">${sw.name}</div><div class="sw-desc">${trunc(sw.desc,90)}</div>`;
      item.append(badge,info); s.appendChild(item);
    });
    body.appendChild(s);
  },
  _campaigns(body,g) {
    const camps=DATA.campaigns.filter(c=>c.group===g.name);
    if(!camps.length){body.innerHTML='<div class="empty">No campaigns documented.</div>';return;}
    const s=document.createElement('div'); s.className='p-section';
    s.innerHTML=`<div class="p-section-label">${camps.length} Campaigns</div>`;
    camps.forEach(c=>{
      const item=document.createElement('div');
      item.style.cssText='background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r-md);padding:12px 14px;margin-bottom:8px';
      item.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
        <div style="font-size:13px;font-weight:600;color:var(--tx)">${c.name}</div>
        <span style="font-family:var(--mono);font-size:10px;color:var(--tx3)">${c.year}</span>
      </div><div style="font-size:12px;color:var(--tx2);line-height:1.6">${c.desc}</div>`;
      s.appendChild(item);
    });
    body.appendChild(s);
  }
};

/* BOOT */
Router.build();
Router.go('actors');
document.querySelectorAll('[data-page="actors"]').forEach(b=>b.classList.add('active'));
// show last updated date
const ub = document.getElementById('updated-badge');
if (ub && DATA.updatedAt) {
  ub.textContent = `Last updated: ${DATA.updatedAt}`;
  ub.style.display = 'block';
}
</script>
</body>
</html>
