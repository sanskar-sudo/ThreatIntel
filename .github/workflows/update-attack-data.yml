name: Update MITRE ATT&CK Data

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:       # Also allows manual trigger from GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write      # Needed to commit and push changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch

      - name: Fetch and inject MITRE ATT&CK data
        run: node scripts/fetch-attack-data.js

      - name: Commit updated file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add threat-actors.html
          git diff --staged --quiet || git commit -m "chore: update MITRE ATT&CK data $(date +'%Y-%m-%d')"
          git push
